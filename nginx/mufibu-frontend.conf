# =============================================================================
# MuFiBu - Frontend nginx configuration
# Serves the React single-page application over HTTPS and reverse-proxies
# /api/ to the backend nginx listener on 127.0.0.1:8080.
#
# Plain HTTP is redirected to HTTPS so the Secure auth cookies are always sent
# over TLS.  setup.sh generates a self-signed certificate at the paths below if
# none exists; replace it with a real certificate (e.g. Let's Encrypt) in
# production:
#   /etc/mufibu/tls/fullchain.pem
#   /etc/mufibu/tls/privkey.pem
# =============================================================================

# Rate limit: 60 requests/minute per client IP with a burst of 20.
# login has its own per-user lockout; this guards all other API endpoints.
limit_req_zone $binary_remote_addr zone=mufibu_api:10m rate=60r/m;
limit_req_status 429;

upstream mufibu_api_proxy {
    server 127.0.0.1:8080;
    keepalive 16;
}

# ---------------------------------------------------------------------------
# HTTP :80 - serve ACME challenges, redirect everything else to HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    # Let's Encrypt webroot validation must stay reachable over plain HTTP.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/mufibu/frontend;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }

    access_log /var/log/nginx/mufibu-frontend-access.log;
    error_log  /var/log/nginx/mufibu-frontend-error.log warn;
}

# ---------------------------------------------------------------------------
# HTTPS :443 - SPA + API proxy
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/mufibu/tls/fullchain.pem;
    ssl_certificate_key /etc/mufibu/tls/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:MufibuTLS:10m;
    ssl_session_timeout 1d;

    # React build output
    root /var/www/mufibu/frontend;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Security headers (HSTS is safe now that the site is HTTPS-only)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    # CSP: scripts are same-origin only (no inline scripts); unsafe-inline for
    # styles is required because the React SPA uses inline style props which
    # become style="" HTML attributes at runtime.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; base-uri 'self';" always;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health check: bypass rate limiting so liveness probes are never throttled.
    location = /api/v1/health {
        proxy_pass         http://mufibu_api_proxy;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Forward all /api/ requests to the backend proxy with rate limiting.
    location /api/ {
        limit_req zone=mufibu_api burst=20 nodelay;
        proxy_pass         http://mufibu_api_proxy;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Do not cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # React SPA: all other routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    access_log /var/log/nginx/mufibu-frontend-access.log;
    error_log  /var/log/nginx/mufibu-frontend-error.log warn;
}
