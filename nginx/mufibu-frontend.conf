# =============================================================================
# MuFiBu - Frontend nginx configuration
# Serves the React single-page application on port 80.
# Static assets are served directly from the build output directory.
# API calls (/api/) are reverse-proxied to the backend nginx upstream
# (mufibu-backend.conf) on port 8080.
# =============================================================================

server {
    listen 80;
    server_name _;

    # React build output
    root /var/www/mufibu/frontend;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Forward all /api/v1/ requests to the backend proxy
    location /api/ {
        proxy_pass         http://mufibu_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Do not cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # React SPA: all other routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    access_log /var/log/nginx/mufibu-frontend-access.log;
    error_log  /var/log/nginx/mufibu-frontend-error.log warn;
}
