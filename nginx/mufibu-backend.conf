# =============================================================================
# MuFiBu - Backend nginx configuration
# Acts as a reverse proxy in front of the Gunicorn/Uvicorn Python application
# running on 127.0.0.1:8000.
# Listens on port 8080 so the frontend nginx can forward /api/ traffic here.
# =============================================================================

# Upstream definition for the Python application server
upstream mufibu_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 8080;
    server_name 127.0.0.1 localhost;

    # Allow only internal / loopback traffic
    # Uncomment and adjust if you need to restrict further:
    # allow 127.0.0.1;
    # deny all;

    # Request/response limits
    client_max_body_size 10m;

    # Security headers
    add_header X-Frame-Options        "DENY"         always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # Do not expose backend server tokens
    server_tokens off;

    location / {
        proxy_pass         http://mufibu_backend;
        proxy_http_version 1.1;

        # Required for keep-alive upstream connections
        proxy_set_header   Connection        "";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Forward the JWT Authorization header unchanged
        proxy_set_header   Authorization     $http_authorization;
        proxy_pass_header  Authorization;

        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;

        # Do not buffer responses (important for streaming / large JSON)
        proxy_buffering    off;
        proxy_request_buffering off;
    }

    # Health check endpoint (fast internal check)
    location = /api/v1/health {
        proxy_pass         http://mufibu_backend/api/v1/health;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        access_log off;
    }

    # Block any requests for hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    access_log /var/log/nginx/mufibu-backend-access.log;
    error_log  /var/log/nginx/mufibu-backend-error.log warn;
}
